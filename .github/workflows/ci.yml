name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ─── 2. Typecheck ────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ─── 3. Unit tests ──────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  # ─── 4. Dependency security audit ───────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail only on high/critical vulnerabilities.
      #
      # Known accepted MODERATE issues (do NOT block CI, do NOT "fix" with --force):
      #   - postcss <8.5.10 (XSS) via next. The only available fix is
      #     `npm audit fix --force`, which downgrades next to 9.x — a breaking
      #     change we will not make. Resolved upstream once next ships a patched
      #     postcss; re-check on each Next.js upgrade.
      #
      # HIGH issues are all resolved:
      #   - protobufjs etc. fixed via plain `npm audit fix`.
      #   - d3-color ReDoS (transitive via react-simple-maps@3 → d3-zoom) is
      #     pinned to the patched ^3.1.0 through the "overrides" field in
      #     package.json (its public API is unchanged, so d3-interpolate /
      #     d3-transition stay compatible — verified by build + tests).
      - run: npm audit --audit-level=high

  # ─── 5. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Non-sensitive placeholders so Next.js build doesn't error on missing vars
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      ANTHROPIC_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # ─── 6. E2E tests (on PRs only — skip on main to keep CI fast) ──────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    # Only run on PRs to avoid blocking main push deploys
    if: github.event_name == 'pull_request'
    needs: [build]
    env:
      AI_MOCK: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── 7. Post-deploy smoke test (main branch only) ───────────────────────────
  smoke:
    name: Smoke test (production)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Wait a bit for Vercel deployment to complete
    needs: [build]
    steps:
      - name: Wait for Vercel deployment
        run: sleep 60
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.cosmo-gram.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
