name: Cron — Listy od Astrei (drip)

# Pewny fallback dla cronu listów — Vercel Hobby nie odpala cronów niezawodnie.
# Wymaga sekretu repo: CRON_SECRET (Settings → Secrets and variables → Actions),
# z tą samą wartością co CRON_SECRET w Vercelu.

on:
  schedule:
    - cron: "0 4 * * *"   # codziennie 04:00 UTC (GitHub może opóźnić o kilkanaście minut)
  workflow_dispatch: {}    # ręczny przycisk w zakładce Actions

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger letters-drip
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Brak sekretu CRON_SECRET w repo (Settings → Secrets → Actions)."
            exit 1
          fi
          echo "→ Wywołuję /api/cron/letters-drip…"
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X GET \
            "https://www.cosmo-gram.com/api/cron/letters-drip" \
            -H "Authorization: Bearer ${CRON_SECRET}")
          echo "HTTP ${HTTP}"
          cat /tmp/resp.json; echo
          [ "$HTTP" = "200" ] || { echo "::error::Cron zwrócił ${HTTP}"; exit 1; }
