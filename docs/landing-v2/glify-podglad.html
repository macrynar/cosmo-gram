<!DOCTYPE html>

<title>Cosmogram — glify zodiaku v1</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0912;--el:#14101F;--t:#F4F1EA;--ts:#B6AFC6;--tm:#877FA0;--a:#FFAE3D;--ad:#E0B566;--l:#2B2540}
*{margin:0;box-sizing:border-box}
body{background:radial-gradient(120% 90% at 50% 0%,#1A1530 0%,#0B0912 70%) fixed var(--bg);color:var(--t);
font-family:'General Sans',system-ui,sans-serif;padding:64px 24px}
.wrap{max-width:1140px;margin:0 auto}
h1{font-size:28px;font-weight:700;letter-spacing:-.01em}
p.lede{color:var(--ts);margin:8px 0 48px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}
.g{background:var(--el);border:1px solid var(--l);border-radius:16px;padding:28px 20px;text-align:center;
transition:border-color .25s,box-shadow .25s}
.g:hover{border-color:var(--ad);box-shadow:0 0 32px rgba(224,181,102,.12)}
.big{width:64px;height:64px;color:var(--ad);display:block;margin:0 auto 18px;filter:drop-shadow(0 0 10px rgba(224,181,102,.35))}
.row{display:flex;gap:14px;justify-content:center;margin-bottom:14px}
.sm{width:20px;height:20px;color:var(--a)}
.sm.dim{color:var(--tm)}
.g span{font-size:14px;color:var(--ts)}
</style></head><body>
