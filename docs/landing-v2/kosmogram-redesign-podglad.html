<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kosmogram — podgląd redesignu (do porównania z landingiem)</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#0B0912;--bg-elevated:#14101F;--text-primary:#F4F1EA;--text-secondary:#B6AFC6;
  --text-muted:#877FA0;--accent:#FFAE3D;--accent-deep:#E0B566;--voice:#E9DCC0;
  --line:#2B2540;--line-soft:rgba(182,175,198,.14);--tense:#E2654A;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;box-sizing:border-box}
body{background:radial-gradient(120% 90% at 50% 0%,#1A1530 0%,#0B0912 70%) fixed var(--bg-base);
  color:var(--text-primary);font-family:'General Sans',system-ui,sans-serif;padding:48px 20px 80px}
.wrap{max-width:1040px;margin:0 auto}
.eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent-deep);text-align:center}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;text-align:center;margin:6px 0 2px;letter-spacing:.01em}
.note{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:36px}
.altar{background:radial-gradient(ellipse at 50% 0%,rgba(26,21,48,.55) 0%,var(--bg-base) 70%);
  border:1px solid var(--line);border-radius:24px;padding:34px 28px;position:relative;overflow:hidden}
.altar::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(80% 60% at 70% 12%,rgba(94,72,162,.18) 0,transparent 60%),
            radial-gradient(60% 50% at 18% 85%,rgba(38,99,138,.12) 0,transparent 60%)}
.grid{position:relative;z-index:1;display:grid;grid-template-columns:176px minmax(0,1fr) 176px;
  grid-template-rows:auto auto;column-gap:28px;row-gap:24px;align-items:center;justify-items:center}
.card{position:relative;cursor:pointer;background:var(--bg-elevated);border:1px solid var(--line);border-radius:16px;
  padding:16px;width:176px;text-align:center;transition:border-color .25s var(--ease),box-shadow .3s var(--ease)}
.tip{position:absolute;left:50%;margin-left:-120px;width:240px;z-index:60;pointer-events:none;text-align:center;
  padding:14px 16px;border-radius:14px;background:var(--bg-elevated);border:1px solid var(--line);
  box-shadow:0 12px 48px rgba(0,0,0,.55);opacity:0;visibility:hidden;transition:opacity .22s var(--ease),transform .22s var(--ease)}
.tip.above{bottom:calc(100% + 12px);transform:translateY(4px)}
.tip.below{top:calc(100% + 12px);transform:translateY(-4px)}
.card:hover .tip{opacity:1;visibility:visible;transform:translateY(0)}
.tip .te{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:8px}
.tip .tq{font-family:'Fraunces',serif;font-style:italic;font-size:13px;line-height:1.45;color:var(--voice);margin-bottom:8px}
.tip .td{font-size:11.5px;line-height:1.5;color:var(--text-muted);margin-bottom:10px}
.tip .tk{display:flex;flex-wrap:wrap;justify-content:center;gap:5px}
.tip .tk span{font-size:9.5px;padding:2px 8px;border-radius:999px;color:var(--accent-deep);border:1px solid var(--line);background:rgba(224,181,102,.06)}
.card:hover{border-color:var(--accent-deep);box-shadow:0 0 48px rgba(255,174,61,.14)}
.card .portrait{position:relative;width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--line-soft)}
.card .portrait img{width:100%;height:100%;object-fit:cover;transition:transform .3s var(--ease)}
.card:hover .portrait img{transform:scale(1.02)}
.card .lab{margin-top:14px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep)}
.card .sign{margin-top:5px;font-weight:600;font-size:21px;letter-spacing:-.01em;color:var(--text-primary)}
.card .meta{margin-top:3px;font-size:14px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.chips{position:relative;z-index:1;margin-top:28px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;
  background:var(--bg-elevated);border:1px solid var(--line)}
.chip .lab{font-weight:600;letter-spacing:.06em;font-size:10px;color:var(--accent-deep)}
.chip .val{font-size:11px;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.micro{position:relative;z-index:1;text-align:center;color:var(--text-muted);font-size:11px;margin-top:16px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap">

<div class="eyebrow">Kosmogram natalny</div>
<h1>Twoja Wielka Trójka</h1>
<p class="note">Podgląd redesignu z Twoimi danymi · ten sam język wizualny co landing (ryt złotą linią, jedno światło, tokeny DS)</p>

<div class="altar">
  <div class="grid">
    <div style="grid-column:2;grid-row:1"><div class="card" id="c-sun"></div></div>
    <div style="grid-column:1;grid-row:2"><div class="card" id="c-asc"></div></div>
    <div style="grid-column:2;grid-row:2;width:100%;position:relative">
      <div id="backdrop" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:92%;max-width:520px;aspect-ratio:1;border-radius:50%;opacity:.9;overflow:hidden;pointer-events:none"></div>
      <svg id="wheel" viewBox="0 0 600 600" style="position:relative;width:100%;display:block" aria-label="Koło kosmogramu"></svg>
    </div>
    <div style="grid-column:3;grid-row:2"><div class="card" id="c-moon"></div></div>
  </div>
  <div class="chips" id="chips"></div>
  <p class="micro">Najedź na symbol w kole, by zobaczyć jego aspekty · kliknij planetę po szczegóły</p>
</div>

<script>
const CDN="https://d8j0ntlcm91z4.cloudfront.net/user_3EFduSqbvnymFyBD7x7Gq2XzuOp";
const PORTRAIT={capricorn:"hf_20260612_203210_6fe0a235-4da0-4d16-a6da-a6f9ecc1ef90.png",
  sagittarius:"hf_20260612_203157_74b184ad-a380-46da-b751-3437ff7aa853.png",
  scorpio:"hf_20260612_203155_3e74c744-13f9-4271-b6fe-ed46156c5da2.png"};
const KEYS=["aries","taurus","gemini","cancer","leo","virgo","libra","scorpio","sagittarius","capricorn","aquarius","pisces"];
const PL=["Baran","Byk","Bliźnięta","Rak","Lew","Panna","Waga","Skorpion","Strzelec","Koziorożec","Wodnik","Ryby"];
const G={
 aries:'<path d="M12 20V8 M12 8C12 4.6 9.6 3.4 7.9 4.7C6.1 6.1 6.2 9 7.9 10.7 M12 8C12 4.6 14.4 3.4 16.1 4.7C17.9 6.1 17.8 9 16.1 10.7"/>',
 taurus:'<path d="M5.5 4C7 7.4 9.3 8.8 12 8.8C14.7 8.8 17 7.4 18.5 4"/><circle cx="12" cy="14.2" r="5.2"/>',
 gemini:'<path d="M9 6.8V17.2 M15 6.8V17.2 M5.2 4.6C8 6.4 16 6.4 18.8 4.6 M5.2 19.4C8 17.6 16 17.6 18.8 19.4"/>',
 cancer:'<circle cx="8.1" cy="9.3" r="2.6"/><circle cx="15.9" cy="14.7" r="2.6"/><path d="M8.1 6.7C13 6.7 16.9 8.4 18.7 11 M15.9 17.3C11 17.3 7.1 15.6 5.3 13"/>',
 leo:'<circle cx="7.4" cy="15.8" r="2.5"/><path d="M7.4 13.3C7.4 8.2 9.8 5.4 12.8 5.4C15.7 5.4 17.2 7.6 17.2 9.8C17.2 12.4 15.2 13.8 15.2 16.4C15.2 18.2 16.4 19 17.9 18.5"/>',
 virgo:'<path d="M4.4 6.2C5.7 6.2 6.5 7.1 6.5 8.6V16.8 M6.5 8.6C6.5 6.9 7.6 6 8.8 6C10.1 6 10.9 7 10.9 8.6V16.8 M10.9 8.6C10.9 6.9 12 6 13.2 6C14.5 6 15.3 7 15.3 8.6V14.2C15.3 17.6 17.2 19 19.6 18.4 M18.9 12.9C16.8 13.8 15.6 15.9 15.3 19.6"/>',
 libra:'<path d="M4.8 18.6H19.2 M4.8 14.6H8.6C8.6 11 9.9 8.4 12 8.4C14.1 8.4 15.4 11 15.4 14.6H19.2"/>',
 scorpio:'<path d="M4.4 6.2C5.7 6.2 6.5 7.1 6.5 8.6V16.8 M6.5 8.6C6.5 6.9 7.6 6 8.8 6C10.1 6 10.9 7 10.9 8.6V16.8 M10.9 8.6C10.9 6.9 12 6 13.2 6C14.5 6 15.3 7 15.3 8.6V13.6C15.3 16.5 16.9 18.2 19.6 18.2 M19.6 18.2L17.5 16.5 M19.6 18.2L17.6 19.9"/>',
 sagittarius:'<path d="M5.4 18.6L18.6 5.4 M18.6 5.4H13.9 M18.6 5.4V10.1 M8.6 11.6L12.4 15.4"/>',
 capricorn:'<path d="M4.2 6.6C5.6 4.9 7.7 5.4 8.2 7.5C8.9 10.4 9.7 13.3 10.5 15.6 M10.5 15.6C11.2 12.1 12.2 8.2 13.7 7C15.2 5.9 16.4 6.9 16.4 8.6C16.4 10.3 15.1 11.1 15.1 13.1C15.1 15.4 16.7 16.4 18.1 15.7C19.6 15 19.8 12.9 18.6 12"/>',
 aquarius:'<path d="M4.6 9.6L8.1 6.6L11.6 9.6L15.1 6.6L18.6 9.6 M4.6 16.8L8.1 13.8L11.6 16.8L15.1 13.8L18.6 16.8"/>',
 pisces:'<path d="M7.2 4.6C9.9 7.6 9.9 16.4 7.2 19.4 M16.8 4.6C14.1 7.6 14.1 16.4 16.8 19.4 M5.6 12H18.4"/>'};
// Przykładowe dane (Twój screen): ASC Strzelec 2°, Słońce Koziorożec 6°, Księżyc Skorpion 24°
const ASC=242, MC=190;
const P=[
 {n:"Słońce",s:"☉",lon:276},{n:"Księżyc",s:"☽",lon:234},{n:"Merkury",s:"☿",lon:262},
 {n:"Wenus",s:"♀",lon:300},{n:"Mars",s:"♂",lon:158},{n:"Jowisz",s:"♃",lon:65},{n:"Saturn",s:"♄",lon:318}
];
const ASPECTS=[["Słońce","Merkury","h"],["Słońce","Mars","t"],["Księżyc","Wenus","h"],["Saturn","Wenus","h"],["Jowisz","Saturn","t"]];

const CX=300,CY=300,FE="︎";
const R_OUTER=278,R_ZODIAC=242,R_SIGN=260,R_HOUT=218,R_HIN=196,R_HNUM=207,R_PL=172,R_HUB=92,R_ASP=150;
const NS="http://www.w3.org/2000/svg";
function ang(lon){return Math.PI-((lon-ASC+360)%360)*Math.PI/180;}
function xy(a,r){return[CX+r*Math.cos(a),CY+r*Math.sin(a)];}
function el(t,at){const e=document.createElementNS(NS,t);for(const k in at)e.setAttribute(k,at[k]);return e;}
const occ=new Set(P.map(p=>Math.floor(((p.lon%360)+360)%360/30)));
const W=document.getElementById("wheel");

// defs
const defs=el("defs");
defs.innerHTML=`<radialGradient id="hub"><stop offset="55%" stop-color="rgba(255,174,61,0)"/><stop offset="100%" stop-color="rgba(255,174,61,.08)"/></radialGradient>
<radialGradient id="disc"><stop offset="0%" stop-color="#14101F"/><stop offset="100%" stop-color="#0B0912"/></radialGradient>`;
W.appendChild(defs);
// wedges
for(let i=0;i<12;i+=2){const sA=ang(i*30),eA=ang((i+1)*30);const[a,b]=xy(sA,R_OUTER),[c,d]=xy(eA,R_OUTER),[e2,f]=xy(eA,R_ZODIAC),[g2,h]=xy(sA,R_ZODIAC);
 W.appendChild(el("path",{fill:"rgba(224,181,102,.03)",d:`M ${a} ${b} A ${R_OUTER} ${R_OUTER} 0 0 0 ${c} ${d} L ${e2} ${f} A ${R_ZODIAC} ${R_ZODIAC} 0 0 1 ${g2} ${h} Z`}));}
// rings
[[R_OUTER,"rgba(224,181,102,.30)"],[R_ZODIAC,"#2B2540"],[R_HOUT,"rgba(43,37,64,.7)"],[R_HIN,"rgba(43,37,64,.55)"]].forEach(([r,st])=>
 W.appendChild(el("circle",{cx:CX,cy:CY,r,fill:"none",stroke:st,"stroke-width":1})));
// ticks
for(let d=0;d<360;d+=5){if(d%30===0)continue;const a=ang(d),L=d%10===0?9:5;const[x1,y1]=xy(a,R_ZODIAC),[x2,y2]=xy(a,R_ZODIAC-L);
 W.appendChild(el("line",{x1,y1,x2,y2,stroke:"#2B2540","stroke-width":.8,opacity:.55}));}
// sign boundaries + glyphs
for(let i=0;i<12;i++){const a=ang(i*30);const[x1,y1]=xy(a,R_OUTER),[x2,y2]=xy(a,R_ZODIAC);
 W.appendChild(el("line",{x1,y1,x2,y2,stroke:"#2B2540","stroke-width":1,opacity:.7}));
 const[gx,gy]=xy(ang(i*30+15),R_SIGN);const on=occ.has(i);
 const sv=el("svg",{x:gx-11,y:gy-11,width:22,height:22,viewBox:"0 0 24 24",fill:"none"});
 sv.style.color=on?"#E0B566":"#877FA0";sv.style.opacity=on?1:.65;
 sv.innerHTML=`<g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">${G[KEYS[i]]}</g>`;
 W.appendChild(sv);}
// houses (equal-house preview) + numbers
for(let k=0;k<12;k++){const lon=(ASC+k*30)%360,a=ang(lon);const[x1,y1]=xy(a,R_ZODIAC-2),[x2,y2]=xy(a,R_HUB+2);
 const angular=[0,3,6,9].includes(k);
 W.appendChild(el("line",{x1,y1,x2,y2,stroke:angular?"rgba(224,181,102,.28)":"rgba(43,37,64,.55)","stroke-width":angular?1:.6,"stroke-dasharray":angular?"":"3 5"}));
 const[nx,ny]=xy(ang(lon+15),R_HNUM);const t=el("text",{x:nx,y:ny,"text-anchor":"middle","dominant-baseline":"central","font-size":10.5,fill:"#877FA0","fill-opacity":angular?.9:.55});
 t.style.fontFamily="'General Sans',sans-serif";t.style.fontVariantNumeric="tabular-nums";t.textContent=k+1;W.appendChild(t);}
// hub
W.appendChild(el("circle",{cx:CX,cy:CY,r:R_HUB+26,fill:"url(#hub)"}));
W.appendChild(el("circle",{cx:CX,cy:CY,r:R_HUB,fill:"url(#disc)",stroke:"#2B2540","stroke-width":1}));
const brand=el("g",{transform:`translate(${CX},${CY}) scale(.42)`,fill:"#E0B566",opacity:.2});
brand.innerHTML='<path d="M 28.79,-40.86 A 50,50 0 1,0 28.79,40.86 A 40,40 0 1,1 28.79,-40.86 Z"/><circle cx="10" cy="0" r="9"/>';W.appendChild(brand);
// aspects
const byName=Object.fromEntries(P.map(p=>[p.n,p]));
ASPECTS.forEach(([a1,a2,t])=>{const p=byName[a1],q=byName[a2];if(!p||!q)return;const[x1,y1]=xy(ang(p.lon),R_ASP),[x2,y2]=xy(ang(q.lon),R_ASP);
 W.appendChild(el("line",{x1,y1,x2,y2,stroke:t==="h"?"#E0B566":"#E2654A","stroke-width":1.1,opacity:.45,"stroke-dasharray":t==="t"?"4 3":""}));});
// planets
P.forEach(p=>{const a=ang(p.lon);const[gx,gy]=xy(a,R_PL),[dx,dy]=xy(a,R_PL-22),[lx,ly]=xy(a,R_PL-44);
 const halo=el("circle",{cx:gx,cy:gy,r:11,fill:"#FFAE3D",opacity:.2});halo.style.filter="blur(3.2px)";W.appendChild(halo);
 W.appendChild(el("circle",{cx:dx,cy:dy,r:3.4,fill:"#FFAE3D"}));
 const g=el("text",{x:gx,y:gy,"text-anchor":"middle","dominant-baseline":"central","font-size":16,fill:"#E9DCC0"});
 g.style.fontFamily="system-ui,'Segoe UI Symbol',sans-serif";g.textContent=p.s+FE;W.appendChild(g);
 const deg=Math.floor(((p.lon%360)+360)%360%30);const lt=el("text",{x:lx,y:ly,"text-anchor":"middle","dominant-baseline":"central","font-size":10,fill:"#877FA0"});
 lt.style.fontFamily="'General Sans',sans-serif";lt.style.fontVariantNumeric="tabular-nums";lt.textContent=deg+"°";W.appendChild(lt);});
// axes
function axis(lon,lab,strong){const a=ang(lon);const[x1,y1]=xy(a,R_OUTER+2),[x2,y2]=xy(a,R_HUB),[lx,ly]=xy(a,R_OUTER+18);
 W.appendChild(el("line",{x1,y1,x2,y2,stroke:"#E0B566","stroke-width":1.5,"stroke-opacity":strong?.7:.28,"stroke-dasharray":strong?"":"5 4"}));
 const t=el("text",{x:lx,y:ly,"text-anchor":"middle","dominant-baseline":"central","font-size":11,fill:"#877FA0","fill-opacity":strong?1:.55});
 t.style.fontFamily="'General Sans',sans-serif";t.style.letterSpacing=".08em";t.textContent=lab;W.appendChild(t);}
axis(ASC,"ASC",true);axis((ASC+180)%360,"DSC",false);axis(MC,"MC",true);axis((MC+180)%360,"IC",false);
// (środek = oczko znaku z logo w piaście — bez osobnego markera)

// backdrop
document.getElementById("backdrop").innerHTML=`<img src="../../public/assets/landing/wheel-backdrop.png" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;

// Big Three cards
function signIndex(lon){return Math.floor(((lon%360)+360)%360/30);}
function card(id,lab,key,deg,signName,elName,eyebrow,bodyDesc,signDesc,kw,side){
 document.getElementById(id).innerHTML=
  `<div class="portrait"><img src="${CDN}/${PORTRAIT[key]}" alt="${signName}"></div>
   <div class="lab">${lab}</div><div class="sign">${signName}</div><div class="meta">${deg}° · ${elName}</div>
   <div class="tip ${side}"><div class="te">${eyebrow}</div><div class="tq">„${bodyDesc}"</div><div class="td">${signDesc}</div><div class="tk">${kw.map(k=>`<span>${k}</span>`).join("")}</div></div>`;}
card("c-sun","Słońce","capricorn",6,"Koziorożec","Ziemia","Słońce w Koziorożcu",
 "Twoje Słońce definiuje tożsamość, wolę i drogę wyrażania siebie w świecie.",
 "Ziemia ambicji. Dyscyplina, czas i budowanie trwałego.",["ambicja","dyscyplina","trwałość"],"below");
card("c-asc","Ascendent","sagittarius",2,"Strzelec","Ogień","Ascendent w Strzelcu",
 "Twój Ascendent to maska, którą pokazujesz światu — pierwsze wrażenie i instynktowna reakcja.",
 "Ogień wizji. Filozofia, wolność i poszukiwanie sensu.",["filozofia","wolność","ekspansja"],"above");
card("c-moon","Księżyc","scorpio",24,"Skorpion","Woda","Księżyc w Skorpionie",
 "Twój Księżyc kryje emocjonalne sanktuarium i najgłębsze potrzeby duszy.",
 "Woda transformacji. Głębia, intensywność i odrodzenie.",["transformacja","głębia","intensywność"],"above");

// chips
function glyphSvg(i,c){return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="color:${c}"><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">${G[KEYS[i]]}</g></svg>`;}
const chipData=[["ASC",signIndex(ASC),2],["MC",signIndex(MC),Math.floor(MC%30)],["SŁOŃCE",9,6],["KSIĘŻYC",7,24]];
document.getElementById("chips").innerHTML=chipData.map(([lab,i,deg])=>
 `<div class="chip">${glyphSvg(i,"#E0B566")}<span class="lab">${lab}</span><span class="val">${deg}° ${PL[i]}</span></div>`).join("");
</script>
</div></body></html>
